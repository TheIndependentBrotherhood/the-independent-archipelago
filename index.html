<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Independent Archipelago</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌴 The Independent Archipelago</h1>
      <p>Your complete guide to Archipelago games</p>
    </header>

    <div class="filters">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search games..." 
        class="search-input"
      >
    </div>

    <main id="gamesContainer" class="games-grid">
      <!-- Games will be loaded here -->
    </main>

    <footer>
      <p>Last updated: <span id="lastUpdated"></span></p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
