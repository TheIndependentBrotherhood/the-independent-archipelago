<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Independent Archipelago</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Alphabet navigation -->
    <div class="alphabet-nav" id="alphabetNav">
      <button id="scrollTopBtn" class="scroll-top-btn" title="Back to top">
        <i class="fas fa-arrow-up"></i>
      </button>
      <div class="alphabet-separator"></div>
      <div class="alphabet-letters" id="alphabetLetters"></div>
    </div>

    <div class="container">
      <header>
        <div class="header-content">
          <div class="header-logo-text">
            <img src="favicon.png" alt="Archipelago" class="header-logo" />
            <div class="header-text">
              <h1>The Independent Archipelago</h1>
              <p>Your complete guide to Archipelago games</p>
            </div>
          </div>
        <div class="header-buttons">
          <button
            id="selectionModeBtn"
            class="header-icon-btn"
            title="Create my todo list"
          >
            <i class="fas fa-list-check"></i>
          </button>
          <button
            id="spinWheelBtn"
            class="header-icon-btn"
            title="Spin the wheel"
          >
            <i class="fas fa-dharmachakra"></i>
          </button>
        </div>
      </header>

      <div class="filters">
        <input
          type="text"
          id="searchInput"
          placeholder="Search games..."
          class="search-input"
        />
      </div>

      <div class="filter-section">
        <div class="filter-group">
          <h3>Platform</h3>
          <div id="platformFilter" class="user-filter-list"></div>
        </div>
        <div class="filter-group">
          <h3>To Do</h3>
          <div id="todoUserFilter" class="user-filter-list"></div>
        </div>
        <div class="filter-group">
          <h3>In Progress</h3>
          <div id="inProgressUserFilter" class="user-filter-list"></div>
        </div>
        <div class="filter-group">
          <h3>Completed</h3>
          <div id="completedUserFilter" class="user-filter-list"></div>
        </div>
      </div>

      <div id="resultsCount" class="results-count"></div>

      <!-- Selection Mode Bar -->
      <div id="selectionModeBar" class="selection-mode-bar hidden">
        <div class="selection-mode-content">
          <div class="selection-mode-left">
            <span id="selectedCountDisplay" class="selected-count-display"
              >0 games selected</span
            >
          </div>
          <div class="selection-mode-center">
            <select id="userSelector" class="user-selector">
              <option value="">Select a player...</option>
            </select>
          </div>
          <div class="selection-mode-right">
            <button
              id="selectAllInlineBtn"
              class="selection-mode-action-btn"
              title="Select all"
            >
              <i class="fas fa-check-double"></i> All
            </button>
            <button
              id="deselectAllInlineBtn"
              class="selection-mode-action-btn"
              title="Deselect all"
            >
              <i class="fas fa-times"></i> Clear
            </button>
            <button
              id="exportInlineBtn"
              class="selection-mode-export-btn"
              title="Export as JSON"
            >
              <i class="fas fa-download"></i> Export
            </button>
            <button
              id="exitSelectionModeBtn"
              class="selection-mode-exit-btn"
              title="Exit selection mode"
            >
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
      </div>

      <main id="gamesContainer" class="games-grid">
        <!-- Games will be loaded here -->
      </main>

      <footer>
        <p>Last updated: <span id="lastUpdated"></span></p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
